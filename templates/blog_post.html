{% extends "blog_base.html" %}

{% block content %}
<article class="mx-auto max-w-3xl">
  <a href="/blog/" class="mb-8 inline-flex items-center gap-2 font-blog text-[11px] font-semibold uppercase tracking-[0.28rem] text-slate-400 transition-colors hover:text-primary">
    <span class="material-symbols-outlined text-base">arrow_back</span>
    Back to Blog
  </a>

  <header class="mb-[35px] max-w-3xl">
    <time class="mb-4 block text-slate-400" style="font-family: 'Playfair Display', 'Noto Serif', serif; font-size: 12px; font-feature-settings: normal; font-variation-settings: normal;">{{ post.display_date }}</time>
    <h1 class="font-blog leading-[1.16] tracking-[-0.03em] text-slate-900" style="font-size: 30px; font-weight: 900; font-feature-settings: normal; font-variation-settings: normal;">{{ post.title }}</h1>
  </header>

  <div class="font-blog text-[1rem] leading-[2.08] tracking-[0.01em] text-[rgb(31,31,31)] [&_a]:underline [&_a]:decoration-current [&_a]:decoration-dotted [&_a]:decoration-[1px] [&_a]:underline-offset-[0.16em] [&_a]:[text-decoration-skip-ink:none] [&_blockquote]:my-8 [&_blockquote]:border-l-2 [&_blockquote]:border-primary/20 [&_blockquote]:pl-5 [&_blockquote]:text-slate-600 [&_code]:rounded [&_code]:bg-black/5 [&_code]:px-1.5 [&_code]:py-0.5 [&_code]:text-[0.92em] [&_em]:italic [&_h2]:mt-[30px] [&_h2]:font-blog [&_h2]:text-[1.5rem] [&_h2]:font-semibold [&_h2]:leading-snug [&_h2]:tracking-[-0.02em] [&_h2]:text-slate-900 [&_h2+p]:mt-5 [&_h3]:mt-12 [&_h3]:font-blog [&_h3]:text-[1.65rem] [&_h3]:font-semibold [&_h3]:leading-snug [&_h3]:tracking-[-0.02em] [&_h3]:text-slate-900 [&_h3+p]:mt-4 [&_hr]:my-12 [&_hr]:border-slate-100 [&_img]:my-10 [&_img]:w-full [&_img]:rounded-[1.5rem] [&_img]:shadow-[0_18px_60px_rgba(15,23,42,0.12)] [&_li]:my-2 [&_ol]:my-6 [&_ol]:pl-6 [&_p]:[text-align:justify] [&_p]:[text-justify:inter-ideograph] [&_p+p]:mt-6 [&_p+ol]:mt-6 [&_p+pre]:mt-6 [&_p+ul]:mt-6 [&_pre]:my-8 [&_pre]:overflow-x-auto [&_pre]:rounded-[1.25rem] [&_pre]:bg-slate-950 [&_pre]:p-5 [&_pre]:text-sm [&_pre]:text-slate-100 [&_strong]:font-semibold [&_ul]:my-6 [&_ul]:pl-6 [&_ul+p]:mt-6">
    {{ body }}
  </div>
</article>
{% endblock %}
