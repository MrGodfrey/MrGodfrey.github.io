<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page_title }} - {{ config.name_en }}</title>
<meta name="author" content="{{ config.name_en }}">
<link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
<link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/site.css">
{% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-white font-blog text-[#1b2233] selection:bg-primary/10">
<nav class="fixed inset-x-0 top-0 z-50 border-b border-slate-100 bg-white/90 backdrop-blur-xl">
  <div class="mx-auto flex max-w-4xl items-center justify-between px-6 py-5 md:px-8">
    <a href="/blogs/" class="font-blog text-xl font-medium tracking-[0.01em] text-slate-900 transition-colors hover:text-primary">Yu's Blog</a>
    <a href="/" class="font-blog text-[11px] font-semibold uppercase tracking-[0.28rem] text-slate-500 transition-colors hover:text-primary">Portfolio</a>
  </div>
</nav>

<main class="mx-auto max-w-4xl px-6 pb-24 pt-28 md:px-8">
  {% block content %}{% endblock %}
</main>
</body>
</html>
